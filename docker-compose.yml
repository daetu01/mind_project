version: "3.8"

services:
  nginx:
    image: nginx:latest
    container_name: my-nginx
    ports:
      - "80:80"
    volumes:
      - ./mind_project_front/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    networks:
      - dais-network

  # 로그를 저장하는 DB 역할
  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: mindproject-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml # 이 파일이 현재 폴더에 있어야 함
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dais-network # 로키가 속한 네트워크 이름과 맞춰주세요

  prometheus:
    image: prom/prometheus:latest
    container_name: dais-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=https://daiswhat.com/prometheus/' # 이 줄 추가!
      - '--web.route-prefix=/prometheus' # 이 줄 추가!
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - dais-network

  grafana:
    image: grafana/grafana:latest
    container_name: dais-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      # ⭐ 아래 설정들을 추가하세요!
      - GF_SERVER_DOMAIN=daiswhat.com
      - GF_SERVER_ROOT_URL=https://daiswhat.com/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - dais-network

  # Redis 설정
  redis:
  
    image: redis:latest
    container_name: dais-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - dais-network

    # 2. Backend (Spring Boot)
  backend:
    #image: totodle/spring-api:latest
    build: ./what # backend 폴더의 Dockerfile을 읽어서 빌드
    container_name: spring-api
    expose:
      - "8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://my-db:3306/raid_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=pass
      - SPRING_DATA_REDIS_HOST=dais-redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - db
      - redis # ⭐ 추가: Redis가 먼저 떠야 함
    restart: always
    networks:
      - dais-network

  # 3. Database (MySQL)
  db:
    image: mysql:8.0
    container_name: my-db
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: raid_db
    ports:
      - "3307:3306" # 로컬 DB 툴(DBeaver 등) 접속용
    volumes:
      # 수정 전: - ./mysql/data:/var/lib/mysql
      # 수정 후: 아래처럼 이름만 적으세요 (네임드 볼륨)
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - dais-network
  # 파일 맨 아래(services와 같은 레벨)에 추가
volumes:
  mysql_data:
  redis_data:

# 🚀 이 부분이 빠져서 에러가 난 것입니다!
networks:
  dais-network:
    external: true # 방금 수동으로 만든 네트워크를 쓰겠다는 뜻입니다.
    driver: bridge